<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${formTitle}">Inventory Form</title>
</head>
<body>

<h2 th:text="${formTitle}">Inventory Form</h2>

<nav>
    <a href="/customers">Customers</a> |
    <a href="/products">Products</a> |
    <a href="/stores">Stores</a> |
    <a href="/orders">Orders</a> |
    <a href="/inventory">Inventory</a> |
    <a href="/shipments">Shipments</a>
</nav>

<hr/>

<a href="/inventory">Back to List</a>

<br/><br/>

<form th:action="@{/inventory/save}" th:object="${inventory}" method="post">

    <input type="hidden" th:field="*{inventoryId}"/>

    <table>
        <tr>
            <td><label for="product">Product</label></td>
            <td>
                <select id="product" th:field="*{product}">
                    <option value="">-- Select Product --</option>
                    <option th:each="p : ${products}"
                            th:value="${p.productId}"
                            th:text="${p.productName} + ' (' + ${p.brand} + ')'">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('product')}"
                      th:errors="*{product}" style="color:red"></span>
            </td>
        </tr>
        <tr>
            <td><label for="store">Store</label></td>
            <td>
                <select id="store" th:field="*{store}">
                    <option value="">-- Select Store --</option>
                    <option th:each="s : ${stores}"
                            th:value="${s.storeId}"
                            th:text="${s.storeName}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('store')}"
                      th:errors="*{store}" style="color:red"></span>
            </td>
        </tr>
        <tr>
            <td><label for="productInventory">Stock Quantity</label></td>
            <td>
                <input type="number" id="productInventory"
                       th:field="*{productInventory}"
                       placeholder="Enter quantity" min="0"/>
                <span th:if="${#fields.hasErrors('productInventory')}"
                      th:errors="*{productInventory}" style="color:red"></span>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <button type="submit">Save Inventory</button>
                <a href="/inventory">Cancel</a>
            </td>
        </tr>
    </table>

</form>

</body>
</html>
