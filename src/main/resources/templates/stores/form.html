<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${formTitle}">Store Form</title>
</head>
<body>

<h2 th:text="${formTitle}">Store Form</h2>

<nav>
    <a href="/customers">Customers</a> |
    <a href="/products">Products</a> |
    <a href="/stores">Stores</a> |
    <a href="/orders">Orders</a> |
    <a href="/inventory">Inventory</a> |
    <a href="/shipments">Shipments</a>
</nav>

<hr/>

<a href="/stores">Back to List</a>

<br/><br/>

<form th:action="@{/stores/save}" th:object="${store}" method="post">

    <input type="hidden" th:field="*{storeId}"/>

    <table>
        <tr>
            <td><label for="storeName">Store Name</label></td>
            <td>
                <input type="text" id="storeName" th:field="*{storeName}"
                       placeholder="Enter store name"/>
                <span th:if="${#fields.hasErrors('storeName')}"
                      th:errors="*{storeName}" style="color:red"></span>
            </td>
        </tr>
        <tr>
            <td><label for="webAddress">Web Address</label></td>
            <td>
                <input type="text" id="webAddress" th:field="*{webAddress}"
                       placeholder="Enter web address (optional)"/>
            </td>
        </tr>
        <tr>
            <td><label for="physicalAddress">Physical Address</label></td>
            <td>
                <textarea id="physicalAddress" th:field="*{physicalAddress}"
                          placeholder="Enter physical address (optional)"
                          rows="3" cols="30"></textarea>
            </td>
        </tr>
        <tr>
            <td><label for="latitude">Latitude</label></td>
            <td>
                <input type="number" id="latitude" th:field="*{latitude}"
                       placeholder="Enter latitude (optional)"
                       step="0.000001"/>
            </td>
        </tr>
        <tr>
            <td><label for="longitude">Longitude</label></td>
            <td>
                <input type="number" id="longitude" th:field="*{longitude}"
                       placeholder="Enter longitude (optional)"
                       step="0.000001"/>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <button type="submit">Save Store</button>
                <a href="/stores">Cancel</a>
            </td>
        </tr>
    </table>

</form>

</body>
</html>
