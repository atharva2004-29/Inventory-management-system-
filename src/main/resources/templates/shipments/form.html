```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${formTitle}">Shipment Form</title>
</head>
<body>

<h2 th:text="${formTitle}">Shipment Form</h2>

<nav>
    <a href="/customers">Customers</a> |
    <a href="/products">Products</a> |
    <a href="/stores">Stores</a> |
    <a href="/orders">Orders</a> |
    <a href="/inventory">Inventory</a> |
    <a href="/shipments">Shipments</a>
</nav>

<hr/>

<a href="/shipments">Back to List</a>

<br/><br/>

<form th:action="@{/shipments/save}" th:object="${shipment}" method="post">

    <input type="hidden" th:field="*{shipmentId}"/>

    <table>
        <tr>
            <td><label for="customer">Customer</label></td>
            <td>
                <select id="customer" th:field="*{customer}">
                    <option value="">-- Select Customer --</option>
                    <option th:each="c : ${customers}"
                            th:value="${c.customerId}"
                            th:text="${c.fullName}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('customer')}"
                      th:errors="*{customer}" style="color:red"></span>
            </td>
        </tr>
        <tr>
            <td><label for="store">Store</label></td>
            <td>
                <select id="store" th:field="*{store}">
                    <option value="">-- Select Store --</option>
                    <option th:each="s : ${stores}"
                            th:value="${s.storeId}"
                            th:text="${s.storeName}">
                    </option>
                </select>
                <span th:if="${#fields.hasErrors('store')}"
                      th:errors="*{store}" style="color:red"></span>
            </td>
        </tr>
        <tr>
            <td><label for="deliveryAddress">Delivery Address</label></td>
            <td>
                <textarea id="deliveryAddress" th:field="*{deliveryAddress}"
                          placeholder="Enter delivery address"
                          rows="3" cols="30"></textarea>
            </td>
        </tr>
        <tr>
            <td><label for="shipmentStatus">Status</label></td>
            <td>
                <select id="shipmentStatus" th:field="*{shipmentStatus}">
                    <option value="">-- Select Status --</option>
                    <option value="CREATED">CREATED</option>
                    <option value="SHIPPED">SHIPPED</option>
                    <option value="IN-TRANSIT">IN-TRANSIT</option>
                    <option value="DELIVERED">DELIVERED</option>
                </select>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <button type="submit">Save Shipment</button>
                <a href="/shipments">Cancel</a>
            </td>
        </tr>
    </table>

</form>

</body>
</html>
```
