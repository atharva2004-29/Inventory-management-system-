<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Order Items</title></head>
<body>
<h2>Order Items — Order #<span th:text="${orderId}"></span></h2>
<nav>
    <a href="/customer/dashboard">Dashboard</a> |
    <a href="/customer/products">Browse Products</a> |
    <a href="/customer/orders">My Orders</a> |
    <a href="/customer/shipments">My Shipments</a> |
    <form action="/logout" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Logout</button>
    </form>
</nav>
<hr/>
<a href="/customer/orders">Back to My Orders</a>
<br/><br/>
<table border="1" cellpadding="6" cellspacing="0">
    <thead>
    <tr>
        <th>Product</th>
        <th>Brand</th>
        <th>Size</th>
        <th>Unit Price</th>
        <th>Quantity</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(items)}">
        <td colspan="5">No items found for this order.</td>
    </tr>
    <tr th:each="item : ${items}">
        <td th:text="${item.product.productName}"></td>
        <td th:text="${item.product.brand}"></td>
        <td th:text="${item.product.size}"></td>
        <td th:text="${item.unitPrice}"></td>
        <td th:text="${item.quantity}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
