<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Shipments</title></head>
<body>
<h2>My Shipments</h2>
<nav>
  <a href="/customer/dashboard">Dashboard</a> |
  <a href="/customer/products">Browse Products</a> |
  <a href="/customer/orders">My Orders</a> |
  <a href="/customer/shipments">My Shipments</a> |
  <form action="/logout" method="post" style="display:inline">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit">Logout</button>
  </form>
</nav>
<hr/>
<table border="1" cellpadding="6" cellspacing="0">
  <thead>
  <tr>
    <th>Shipment ID</th><th>Store</th><th>Delivery Address</th><th>Status</th>
  </tr>
  </thead>
  <tbody>
  <tr th:if="${#lists.isEmpty(shipments)}">
    <td colspan="4">No shipments found.</td>
  </tr>
  <tr th:each="shipment : ${shipments}">
    <td th:text="${shipment.shipmentId}"></td>
    <td th:text="${shipment.store.storeName}"></td>
    <td th:text="${shipment.deliveryAddress}"></td>
    <td th:text="${shipment.shipmentStatus}"></td>
  </tr>
  </tbody>
</table>
</body>
</html>
