<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Place Order</title></head>
<body>
<h2>Place Order</h2>
<nav>
    <a href="/customer/dashboard">Dashboard</a> |
    <a href="/customer/products">Browse Products</a> |
    <a href="/customer/orders">My Orders</a> |
    <a href="/customer/shipments">My Shipments</a> |
    <form action="/logout" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Logout</button>
    </form>
</nav>
<hr/>

<div th:if="${errorMessage}" style="color:red">
    <p th:text="${errorMessage}"></p>
</div>

<h3>You are ordering:</h3>
<table border="1" cellpadding="6" cellspacing="0">
    <tr><td>Product</td><td th:text="${product.productName}"></td></tr>
    <tr><td>Brand</td><td th:text="${product.brand}"></td></tr>
    <tr><td>Size</td><td th:text="${product.size}"></td></tr>
    <tr><td>Price per unit</td><td th:text="${product.unitPrice}"></td></tr>
</table>

<br/>

<form action="/customer/order/place" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="productId" th:value="${product.productId}"/>

    <table>
        <tr>
            <td><label for="storeId">Select Store</label></td>
            <td>
                <select id="storeId" name="storeId">
                    <option value="">-- Select a Store --</option>
                    <option th:each="inv : ${inventoryList}"
                            th:value="${inv.store.storeId}"
                            th:text="${inv.store.storeName} + ' (' + ${inv.productInventory} + ' in stock)'">
                    </option>
                </select>
            </td>
        </tr>
        <tr>
            <td><label for="quantity">Quantity</label></td>
            <td>
                <input type="number" id="quantity" name="quantity"
                       value="1" min="1"/>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <button type="submit">Confirm Order</button>
                <a href="/customer/products">Cancel</a>
            </td>
        </tr>
    </table>
</form>

</body>
</html>
