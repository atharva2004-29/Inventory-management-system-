<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Orders</title></head>
<body>
<h2>My Orders</h2>
<nav>
    <a href="/customer/dashboard">Dashboard</a> |
    <a href="/customer/products">Browse Products</a> |
    <a href="/customer/orders">My Orders</a> |
    <a href="/customer/shipments">My Shipments</a> |
    <form action="/logout" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Logout</button>
    </form>
</nav>
<hr/>
<table border="1" cellpadding="6" cellspacing="0">
    <thead>
    <tr>
        <th>Order ID</th><th>Store</th><th>Status</th><th>Date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(orders)}">
        <td colspan="4">No orders found.</td>
    </tr>
    <tr th:each="order : ${orders}">
        <td th:text="${order.orderId}"></td>
        <td th:text="${order.store.storeName}"></td>
        <td th:text="${order.orderStatus}"></td>
        <td th:text="${order.orderTms}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
