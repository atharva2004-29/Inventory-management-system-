<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Customer Login - Order Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/landing.css}"/>
</head>
<body>

<header>
    <h1>Order Inventory System</h1>
</header>

<div class="container">
    <div class="login-section">
        <h2>Customer Login</h2>
        <p>Login to place and track your orders</p>

        <div th:if="${param.error}" class="error-message" style="color: #e74c3c; background: #fdf2f2; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #f5c6cb;">
            Invalid email.
        </div>
        <div th:if="${successMessage}" class="success-message" style="color: #27ae60; background: #eef9f1; padding: 0.8rem; border-radius: 4px; margin-bottom: 1rem; border: 1px solid #c3e6cb;">
            <p th:text="${successMessage}"></p>
        </div>

        <form th:action="@{/customer-login}" method="post" class="login-form">
            <input type="email" id="email" name="email" placeholder="Your Email Address" required autofocus/>
            <button type="submit">Login as Customer</button>
        </form>

        <div class="login-links">
            <p>Are you an admin? <a th:href="@{/admin-login}">Admin Login</a></p>
            <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
            <p><a th:href="@{/}">Back to Home</a></p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2024 Order Inventory Management System. All rights reserved.</p>
</footer>

</body>
</html>
